# AcaClaw Base Environment (general academic — no discipline specialization)
# Installed when the user picks "General academic" during setup.
# Discipline envs (acaclaw-bio, acaclaw-chem, etc.) include all of these
# packages plus discipline-specific additions.
#
# Every version pin is tested together — do not change a pin without
# running the full compatibility suite (pnpm test:compat).
#
# Purpose 3: Keep all skills environment-compatible.
# See docs/architecture.md → Environment Architecture.
name: acaclaw
channels:
  - conda-forge
dependencies:
  - python=3.12
  # --- Core scientific stack (shared by most skills) ---
  - numpy>=1.26,<2.0
  - scipy>=1.12
  - pandas>=2.2
  - matplotlib>=3.8
  - statsmodels>=0.14
  - sympy>=1.12
  # --- Interactive computing ---
  - jupyterlab>=4.1
  # --- Document processing ---
  - openpyxl>=3.1
  - xlsxwriter>=3.2
  # --- pip (required before pip: section) ---
  - pip
  # --- pip-only packages ---
  - pip:
    - semanticscholar>=0.8
    - pymupdf>=1.24
