<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.1)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.05)" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- Abstract Nodes / Network Background -->
  <g stroke="rgba(255,255,255,0.07)" stroke-width="2">
    <path d="M0,200 Q200,100 800,300 M0,800 Q400,600 800,1000 M-100,500 Q300,700 900,400" fill="none" />
    <circle cx="200" cy="150" r="4" fill="#a5b4fc" />
    <circle cx="600" cy="250" r="4" fill="#a5b4fc" />
    <circle cx="400" cy="650" r="4" fill="#a5b4fc" />
    <circle cx="700" cy="850" r="4" fill="#a5b4fc" />
    <circle cx="100" cy="800" r="4" fill="#a5b4fc" />
  </g>

  <!-- Header -->
  <text x="400" y="150" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="76" font-weight="900" fill="#ffffff" text-anchor="middle" filter="url(#glow)">AcaClaw</text>
  <text x="400" y="200" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="28" font-weight="600" fill="#818cf8" text-anchor="middle" letter-spacing="3">ACADEMIA CLAW</text>

  <text x="400" y="260" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#c7d2fe" text-anchor="middle">Your Dedicated AI Co-Scientist</text>

  <text x="400" y="320" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="16" font-weight="300" fill="#e0e7ff" text-anchor="middle">
    <tspan x="400" dy="0">Whether you need an AI Biologist, an AI Chemist, or a Data Scientist,</tspan>
    <tspan x="400" dy="28">AcaClaw provides a discipline-specific digital partner for everyone in academia.</tspan>
    <tspan x="400" dy="28">Terminal geek or first-time computer user, AcaClaw just works.</tspan>
  </text>

  <!-- Features Section -->
  <g transform="translate(100, 430)">
    
    <!-- Box 1 -->
    <g transform="translate(0, 0)">
      <rect width="600" height="110" rx="16" fill="url(#cardBg)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="30" y="45" font-family="'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="bold" fill="#60a5fa">🖥️  User-Friendly GUI</text>
      <text x="30" y="75" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#cbd5e1">No terminal required. Manage everything through an</text>
      <text x="30" y="95" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#cbd5e1">intuitive graphical interface.</text>
    </g>

    <!-- Box 2 -->
    <g transform="translate(0, 130)">
      <rect width="600" height="110" rx="16" fill="url(#cardBg)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="30" y="45" font-family="'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="bold" fill="#34d399">📁  Workspace &amp; Project System</text>
      <text x="30" y="75" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#cbd5e1">File modifications and deletions are restricted to the</text>
      <text x="30" y="95" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#cbd5e1">workspace by default to prevent data loss.</text>
    </g>

    <!-- Box 3 -->
    <g transform="translate(0, 260)">
      <rect width="600" height="110" rx="16" fill="url(#cardBg)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="30" y="45" font-family="'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="bold" fill="#fbbf24">🎓  Academic Skills</text>
      <text x="30" y="75" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#cbd5e1">Deeply customized scientist skills tailored to</text>
      <text x="30" y="95" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#cbd5e1">your specific academic domain.</text>
    </g>

    <!-- Box 4 -->
    <g transform="translate(0, 390)">
      <rect width="600" height="110" rx="16" fill="url(#cardBg)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="30" y="45" font-family="'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="bold" fill="#a78bfa">⚡ Computing Environment</text>
      <text x="30" y="75" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#cbd5e1">Discipline-specific environments that unify Python, R, CUDA, and</text>
      <text x="30" y="95" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#cbd5e1">other scientific computing tools to ensure skill compatibility.</text>
    </g>

    <!-- Box 5 -->
    <g transform="translate(0, 520)">
      <rect width="600" height="110" rx="16" fill="url(#cardBg)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="30" y="45" font-family="'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="bold" fill="#f43f5e">🛡️  Data Backup</text>
      <text x="30" y="75" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#cbd5e1">Automatic backup of every modified file —</text>
      <text x="30" y="95" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#cbd5e1">your data is never at risk.</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(400, 1100)">
    <text x="0" y="0" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#818cf8" text-anchor="middle" letter-spacing="2">POWERED BY OPENCLAW</text>
    <path d="M-130, -5 L-150, -5 L-150, 5" fill="none" stroke="#818cf8" stroke-width="2"/>
    <path d="M130, -5 L150, -5 L150, 5" fill="none" stroke="#818cf8" stroke-width="2"/>
  </g>
</svg>
