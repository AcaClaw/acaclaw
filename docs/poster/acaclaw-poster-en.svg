<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1550" width="900" height="1550">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Specific Gradients for Co-Scientists -->
    <linearGradient id="bio-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="chem-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
    <linearGradient id="data-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="med-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171" />
      <stop offset="100%" stop-color="#dc2626" />
    </linearGradient>

    <linearGradient id="primary-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <!-- Card Backgrounds -->
    <linearGradient id="card-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(59, 130, 246, 0.15)" />
      <stop offset="100%" stop-color="rgba(30, 58, 138, 0.05)" />
    </linearGradient>
    <linearGradient id="card-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(167, 139, 250, 0.15)" />
      <stop offset="100%" stop-color="rgba(76, 29, 149, 0.05)" />
    </linearGradient>
    <linearGradient id="card-gray" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(148, 163, 184, 0.15)" />
      <stop offset="100%" stop-color="rgba(71, 85, 105, 0.05)" />
    </linearGradient>
    <linearGradient id="card-yellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(250, 204, 21, 0.15)" />
      <stop offset="100%" stop-color="rgba(161, 98, 7, 0.05)" />
    </linearGradient>

    <!-- Glowing Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />

  <!-- Decorative Background elements (Scientific vibe) -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1.5" fill="none">
    <!-- Grid -->
    <path d="M0,200 L900,200 M0,400 L900,400 M0,600 L900,600 M0,800 L900,800 M0,1000 L900,1000 M0,1200 L900,1200 M0,1400 L900,1400" />
    <path d="M150,0 L150,1550 M300,0 L300,1550 M450,0 L450,1550 M600,0 L600,1550 M750,0 L750,1550" />
    
    <!-- Abstract connections -->
    <path d="M0,350 C300,250 600,450 900,300" stroke="rgba(167, 139, 250, 0.2)" stroke-width="3"/>
    <path d="M0,850 C200,950 700,750 900,900" stroke="rgba(59, 130, 246, 0.2)" stroke-width="3"/>
  </g>

  <!-- Header Section -->
  <g transform="translate(450, 150)">
    
    <text x="0" y="20" font-family="'Segoe UI', Roboto, sans-serif" font-size="80" font-weight="900" fill="url(#primary-text)" text-anchor="middle" letter-spacing="2" filter="url(#glow)">AcaClaw</text>
    
    <!-- The Core Concept -->
    <g transform="translate(0, 80)">
      <rect x="-320" y="-35" width="640" height="60" rx="30" fill="#312e81" stroke="#6366f1" stroke-width="2" filter="url(#glow)"/>
      <text x="0" y="5" font-family="'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="800" fill="#fff" text-anchor="middle" letter-spacing="1">🚀 Your Own AI Co-Scientist</text>
    </g>

    <text x="0" y="160" font-family="'Segoe UI', Roboto, sans-serif" font-size="22" fill="#cbd5e1" text-anchor="middle" font-weight="600">A discipline-specific digital partner tailored just for you!</text>
  </g>


  <!-- ================= CO-SCIENTISTS CARDS (HERO SECTION) ================= -->
  <!-- This highlights the "Digital Biologist, Chemist..." concept prominently as requested -->
  <g transform="translate(450, 520)">
    <text x="0" y="-120" font-family="'Segoe UI', Roboto, sans-serif" font-size="32" font-weight="800" fill="#e2e8f0" text-anchor="middle">🎓 Summon Your Field Master</text>
    <text x="0" y="-85" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">"You need an AI Biologist? An AI Chemist? We've got them all."</text>

    <!-- Biologist -->
    <g transform="translate(-320, 0)">
      <circle cx="0" cy="0" r="60" fill="url(#bio-grad)" filter="url(#glow)"/>
      <!-- DNA icon -->
      <path d="M-15,-20 Q0,0 15,20 M-15,20 Q0,0 15,-20" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <line x1="-10" y1="-10" x2="10" y2="-10" stroke="#fff" stroke-width="2"/>
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#fff" stroke-width="2"/>
      <line x1="-10" y1="10" x2="10" y2="10" stroke="#fff" stroke-width="2"/>
      <!-- Background Circle decoration -->
      <circle cx="0" cy="0" r="75" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
      <text x="0" y="100" font-family="'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="700" fill="#34d399" text-anchor="middle">AI Biologist</text>
    </g>

    <!-- Chemist -->
    <g transform="translate(-110, 0)">
      <circle cx="0" cy="0" r="60" fill="url(#chem-grad)" filter="url(#glow)"/>
      <!-- Flask icon -->
      <path d="M-10,-20 L10,-20 L10,-10 L25,15 C28,20 25,25 20,25 L-20,25 C-25,25 -28,20 -25,15 L-10,-10 Z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
      <!-- Bubbles -->
      <circle cx="-5" cy="5" r="3" fill="#fff"/>
      <circle cx="8" cy="18" r="2" fill="#fff"/>
      <circle cx="0" cy="0" r="75" fill="none" stroke="#f472b6" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
      <text x="0" y="100" font-family="'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="700" fill="#f472b6" text-anchor="middle">AI Chemist</text>
    </g>

    <!-- Data Scientist -->
    <g transform="translate(110, 0)">
      <circle cx="0" cy="0" r="60" fill="url(#data-grad)" filter="url(#glow)"/>
      <!-- Chart icon -->
      <rect x="-18" y="-10" width="8" height="30" rx="2" fill="#fff"/>
      <rect x="-4" y="-20" width="8" height="40" rx="2" fill="#fff"/>
      <rect x="10" y="0" width="8" height="20" rx="2" fill="#fff"/>
      <path d="M-25,25 L25,25" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="75" fill="none" stroke="#60a5fa" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
      <text x="0" y="100" font-family="'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="700" fill="#60a5fa" text-anchor="middle">Data Scientist</text>
    </g>

    <!-- Doctor/Med -->
    <g transform="translate(320, 0)">
      <circle cx="0" cy="0" r="60" fill="url(#med-grad)" filter="url(#glow)"/>
      <!-- Cross icon -->
      <path d="M-8,-20 L8,-20 L8,-8 L20,-8 L20,8 L8,8 L8,20 L-8,20 L-8,8 L-20,8 L-20,-8 L-8,-8 Z" fill="#fff"/>
      <circle cx="0" cy="0" r="75" fill="none" stroke="#f87171" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
      <text x="0" y="100" font-family="'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="700" fill="#f87171" text-anchor="middle">Med Scientist</text>
    </g>
  </g>


  <!-- ================= FEATURES SECTION ================= -->
  <g transform="translate(0, 750)">
    
    <!-- Row 1: Workspace & GUI -->
    <g transform="translate(60, 0)">
      <!-- Workspace (Left) -->
      <g transform="translate(0, 0)">
        <rect width="370" height="220" rx="24" fill="url(#card-blue)" stroke="#3b82f6" stroke-width="2" stroke-opacity="0.4"/>
        <text x="35" y="55" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#60a5fa">📂 Workspace System</text>
        <text x="35" y="95" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="600" fill="#e2e8f0">Safe &amp; Isolated Environment</text>
        <text x="35" y="125" font-family="'Segoe UI', Roboto, sans-serif" font-size="15" fill="#94a3b8">File modifications remain strictly inside</text>
        <text x="35" y="145" font-family="'Segoe UI', Roboto, sans-serif" font-size="15" fill="#94a3b8">to prevent accidental data loss.</text>
        
        <!-- Decoration -->
        <g transform="translate(290, 160)">
          <path d="M-30,-20 L10,-20 L30,0 L30,40 L-30,40 Z" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
          <path d="M10,-20 L10,0 L30,0" fill="none" stroke="#3b82f6" stroke-width="2"/>
          <!-- Lock -->
          <rect x="-10" y="10" width="20" height="15" rx="3" fill="#60a5fa"/>
        </g>
      </g>

      <!-- GUI (Right) -->
      <g transform="translate(410, 0)">
        <rect width="370" height="220" rx="24" fill="url(#card-yellow)" stroke="#f59e0b" stroke-width="2" stroke-opacity="0.4"/>
        <text x="35" y="55" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#fbbf24">🖱️ No-Code GUI</text>
        <text x="35" y="95" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="600" fill="#e2e8f0">Terminal Not Required</text>
        <text x="35" y="125" font-family="'Segoe UI', Roboto, sans-serif" font-size="15" fill="#94a3b8">Manage environments and files</text>
        <text x="35" y="145" font-family="'Segoe UI', Roboto, sans-serif" font-size="15" fill="#94a3b8">through an intuitive interface.</text>

        <!-- Decoration -->
        <g transform="translate(260, 140)">
          <rect x="0" y="0" width="80" height="50" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
          <circle cx="15" cy="15" r="4" fill="#fbbf24"/>
          <circle cx="30" cy="15" r="4" fill="#fbbf24" opacity="0.5"/>
          <path d="M50,25 L70,45 L60,48 L65,60 L58,63 L51,49 L41,55 Z" fill="#fff" filter="url(#glow)"/>
        </g>
      </g>
    </g>

    <!-- Row 2: Environment & Backup -->
    <g transform="translate(60, 250)">
      <!-- Computing Env -->
      <g transform="translate(0, 0)">
        <rect width="520" height="200" rx="24" fill="url(#card-purple)" stroke="#a855f7" stroke-width="2" stroke-opacity="0.4"/>
        <text x="35" y="55" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#c084fc">⚡ Computing Environment</text>
        <text x="35" y="95" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="600" fill="#e2e8f0">Python, R, CUDA.. unified.</text>
        <text x="35" y="125" font-family="'Segoe UI', Roboto, sans-serif" font-size="15" fill="#94a3b8">Discipline-specific execution environments perfectly</text>
        <text x="35" y="145" font-family="'Segoe UI', Roboto, sans-serif" font-size="15" fill="#94a3b8">managed to eliminate dependency conflicts.</text>

        <!-- Env Pills -->
        <g transform="translate(35, 155)">
          <rect x="0" y="0" width="80" height="28" rx="14" fill="#7e22ce" stroke="#d8b4fe" stroke-width="1"/>
          <text x="40" y="19" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Python</text>
          
          <rect x="90" y="0" width="70" height="28" rx="14" fill="#7e22ce" stroke="#d8b4fe" stroke-width="1"/>
          <text x="125" y="19" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">CUDA</text>

          <rect x="170" y="0" width="70" height="28" rx="14" fill="#7e22ce" stroke="#d8b4fe" stroke-width="1"/>
          <text x="205" y="19" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">R-Stat</text>
        </g>
        
        <!-- Big lightning icon -->
        <path d="M430,40 L400,100 L440,100 L420,160 L470,80 L430,80 Z" fill="#d8b4fe" opacity="0.8" filter="url(#glow)"/>
      </g>

      <!-- Backup (Smaller feature) -->
      <g transform="translate(540, 0)">
        <rect width="240" height="200" rx="24" fill="url(#card-gray)" stroke="#64748b" stroke-width="2" stroke-opacity="0.4"/>
        <text x="120" y="60" font-family="'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="bold" fill="#94a3b8" text-anchor="middle">🛡️ Data Backup</text>
        <text x="120" y="95" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">Zero Data Risk</text>
        <text x="120" y="125" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Automatic snapshot</text>
        <text x="120" y="145" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">before every action.</text>
      </g>
    </g>

  </g>


  <!-- ================= FOOTER ================= -->
  <g transform="translate(450, 1420)">
    
    <path d="M-150,0 Q0,20 150,0" fill="none" stroke="#4f46e5" stroke-width="2"/>
    
    <text x="0" y="45" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="800" fill="#6366f1" text-anchor="middle" letter-spacing="4">POWERED BY OPENCLAW</text>
    
    <!-- Stars -->
    <path d="M-180,40 L-185,35 L-180,30 L-175,35 Z" fill="#6366f1"/>
    <path d="M180,40 L175,35 L180,30 L185,35 Z" fill="#6366f1"/>
  </g>

</svg>
